on:
  push:
  pull_request:
    branches:
      - main

name: "Build"

jobs:
  build-cmake:
    name: ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      matrix:
        platform:
        - { name: Ubuntu,      os: ubuntu-22.04 }
        - { name: UbuntuArm,   os: ubuntu-22.04-arm }
        - { name: Windows32,   os: windows-2022, param: "-A Win32" }
        - { name: Windows,     os: windows-2022 }
        - { name: MacOS14,     os: macos-14 }

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Install Dependencies (Linux)"
        if: ${{ runner.os == 'Linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install libsdl2-dev

      - name: "Install Dependencies (OSX)"
        if: ${{ runner.os == 'macOS' }}
        run: |
          HOMEBREW_NO_AUTO_UPDATE=1 brew install sdl2

      - name: "Install Dependencies (Windows)"
        if: ${{ runner.os == 'Windows' }}
        run: choco install zip

      - name: "Configure"
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCMAKE_INSTALL_PREFIX=build/install ${{ matrix.platform.param }}

      - name: "Build"
        run: cmake --build build --config RelWithDebInfo

      - name: "Install"
        run: cmake --install build --config RelWithDebInfo

      - name: "Test"
        if: ${{ runner.os == 'Linux' || runner.os == 'macOS' }}
        continue-on-error: true
        working-directory: build
        run: ctest --output-on-failure

      - name: "Upload artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.name }}
          path: build/install/*
